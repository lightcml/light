.container {

/* Header */
.header {

.header p {

  color: #8f959e;
}
/* Search Box */
.search-box {
  position: relative;
  margin-bottom: 24px;
}
.search-box input {
  width: 100%;
  height: 52px;
  border: 2px solid #e5e6eb;
  border-radius: 12px;
  padding: 0 48px 0 20px;
  font-size: 16px;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  background: #fff;
}
.search-box input:focus {
  border-color: #3370ff;
  box-shadow: 0 0 0 3px rgba(51,112,255,0.12);
}
.search-box input::placeholder { color: #c0c4cc; }
.search-icon {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 22px;
  height: 22px;
  color: #8f959e;
}
/* Category Filter */
.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.filter-tag {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  border: 1px solid #e5e6eb;
  background: #fff;
  color: #646a73;
  transition: all 0.15s;
  user-select: none;
}
.filter-tag:hover { border-color: #3370ff; color: #3370ff; }
.filter-tag.active { background: #3370ff; color: #fff; border-color: #3370ff; }
/* Stats */
.stats {
  font-size: 13px;
  color: #8f959e;
  margin-bottom: 16px;
  padding-left: 4px;
}
.stats span { color: #3370ff; font-weight: 500; }
/* Results */
.results { display: flex; flex-direction: column; gap: 10px; }
.result-card {
  background: #fff;
  border-radius: 10px;
  padding: 16px 20px;
  border: 1px solid #e5e6eb;
  transition: box-shadow 0.15s, border-color 0.15s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
  display: block;
}
.result-card:hover {
  box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  border-color: #3370ff;
}
.result-name {
  font-size: 15px;
  font-weight: 500;
  margin-bottom: 8px;
  color: #1f2329;
  line-height: 1.5;
}
.result-name mark {
  background: #ffe066;
  color: inherit;
  padding: 0 2px;
  border-radius: 2px;
}
.result-meta {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
}
.result-tag {
  display: inline-flex;
  align-items: center;
  font-size: 12px;
  padding: 2px 8px;
  border-radius: 4px;
  white-space: nowrap;
}
.tag-category { background: #eff4ff; color: #3370ff; }
.tag-quark { background: #fff7e6; color: #d48806; }
.tag-baidu { background: #e6f7ff; color: #1890ff; }
.tag-uc { background: #f0f5ff; color: #597ef7; }
.tag-other { background: #f5f5f5; color: #8c8c8c; }
/* Empty State */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: #8f959e;
}
.empty-icon { font-size: 48px; margin-bottom: 16px; }
.empty p { font-size: 15px; }
/* Suggestion chips */
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-top: 16px;
}
.suggest-chip {
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  background: #fff;
  border: 1px solid #e5e6eb;
  color: #646a73;
  cursor: pointer;
  transition: all 0.15s;
}
.suggest-chip:hover { border-color: #3370ff; color: #3370ff; background: #f0f5ff; }
/* Footer */
.footer {
  text-align: center;
  padding: 40px 0 24px;
  font-size: 12px;
  color: #c0c4cc;
}
/* Mobile */
@media (max-width: 480px) {
  .header { padding: 32px 0 20px; }
  .header h1 { font-size: 22px; }
  .result-card { padding: 12px 14px; }
}
</style>

allTag.onclick=()=>selectCategory(null);
filtersEl.appendChild(allTag);
CATEGORIES.forEach(c=>{
  const tag=document.createElement('span');
  tag.className='filter-tag';
  tag.textContent=c;
  tag.onclick=()=>selectCategory(c);
  filtersEl.appendChild(tag);
});

// Render suggestions
const sugEl=document.getElementById('suggestions');
SUGGEST_KEYWORDS.forEach(k=>{
  const chip=document.createElement('span');
  chip.className='suggest-chip';
  chip.textContent=k;
  chip.onclick=()=>{document.getElementById('searchInput').value=k;doSearch();};
  sugEl.appendChild(chip);
});

let activeCategory=null;
function selectCategory(c){
  activeCategory=c;
  document.querySelectorAll('.filter-tag').forEach(t=>{
    t.classList.toggle('active',t.textContent===(c||'全部'));
  });
  doSearch();
}

// Fuzzy search
function fuzzyMatch(text,query){
  if(!query)return true;
  const q=query.toLowerCase();
  const t=text.toLowerCase();
  // Direct substring match
  if(t.includes(q))return{match:true,score:100};
  // Pinyin initial match for common patterns
  // Each char match with gap allowed
  let qi=0,score=0;
  for(let i=0;i<t.length&&qi<q.length;i++){
    if(t[i]===q[qi]){score+=10-(i>0?1:0);qi++;}
  }
  if(qi===q.length)return{match:true,score:score};
  return{match:false,score:0};
}

function highlightText(text,query){
  if(!query)return text;
  const q=query.toLowerCase();
  const t=text.toLowerCase();
  const idx=t.indexOf(q);
  if(idx===-1)return text;
  return text.slice(0,idx)+'<mark>'+text.slice(idx,idx+q.length)+'</mark>'+text.slice(idx+q.length);
}

function getDiskTag(d){
  if(d.includes('夸克'))return'<span class="result-tag tag-quark">夸克网盘</span>';
  if(d.includes('百度'))return'<span class="result-tag tag-baidu">百度网盘</span>';
  if(d.includes('UC'))return'<span class="result-tag tag-uc">UC网盘</span>';
  return'<span class="result-tag tag-other">'+d+'</span>';
}

let searchTimer=null;
const input=document.getElementById('searchInput');
input.addEventListener('input',()=>{clearTimeout(searchTimer);searchTimer=setTimeout(doSearch,200);});

function doSearch(){
  const query=input.value.trim();
  const emptyEl=document.getElementById('emptyState');
  const resultsEl=document.getElementById('results');
  const statsEl=document.getElementById('stats');
  
  let filtered=DATA;
  if(activeCategory){
    filtered=filtered.filter(r=>r.c===activeCategory);
  }
  
  let results=[];
  if(query){
    filtered.forEach(r=>{
      const m1=fuzzyMatch(r.n,query);
      const m2=fuzzyMatch(r.c,query);
      if(m1.match||m2.match){
        results.push({r,score:Math.max(m1.score,m2.score)+(m1.match&&m2.match?50:0)});
      }
    });
    results.sort((a,b)=>b.score-a.score);
    results=results.map(x=>x.r);
  }else{
    results=filtered;
  }
  
  if(results.length===0&&query){
    emptyEl.style.display='block';
    emptyEl.innerHTML='<div class="empty-icon">😕</div><p>没有找到"'+query+'"相关的资源</p><div class="suggestions"><span class="suggest-chip" onclick="document.getElementById(\'searchInput\').value=\'\';doSearch();">清空搜索</span></div>';
    resultsEl.style.display='none';
    statsEl.innerHTML='';
    return;
  }
  
  if(results.length===0&&!query){
    emptyEl.style.display='block';
    emptyEl.innerHTML='<div class="empty-icon">💡</div><p>试试搜索：英语、数学、中医、副业…</p><div class="suggestions" id="suggestions"></div>';
    resultsEl.style.display='none';
    statsEl.innerHTML='';
    // Re-render suggestions
    const newSug=emptyEl.querySelector('.suggestions');
    SUGGEST_KEYWORDS.forEach(k=>{
      const chip=document.createElement('span');
      chip.className='suggest-chip';
      chip.textContent=k;
      chip.onclick=()=>{document.getElementById('searchInput').value=k;doSearch();};
      newSug.appendChild(chip);
    });
    return;
  }
  
  emptyEl.style.display='none';
  resultsEl.style.display='flex';
  statsEl.innerHTML=query?`找到 <span>${results.length}</span> 个与"${query}"相关的资源`:`共 <span>${results.length}</span> 个资源`;
  
  // Render top 50 results
  const show=results.slice(0,50);
  resultsEl.innerHTML=show.map(r=>{
    const name=query?highlightText(r.n,query):r.n;
    return`<a class="result-card" href="${r.u}" target="_blank" rel="noopener">
      <div class="result-name">${name}</div>
      <div class="result-meta">
        <span class="result-tag tag-category">${r.c}</span>
        ${getDiskTag(r.d)}
      </div>
    </a>`;
  }).join('');
  
  if(results.length>50){
    resultsEl.innerHTML+=`<div style="text-align:center;color:#8f959e;font-size:13px;padding:12px">还有 ${results.length-50} 个结果，请缩小搜索范围</div>`;
  }
}
</script>
</body>
